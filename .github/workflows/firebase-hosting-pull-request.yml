name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/krypton
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Deploy Firebase Preview Channel
        run: |
          echo "$FIREBASE_SA" > /tmp/firebase-sa.json
          CHANNEL_ID="pr-${PR_NUMBER}"
          DEPLOY_URL=$(./node_modules/.bin/firebase hosting:channel:deploy "$CHANNEL_ID" \
            --expires 7d --project stock-kipreos --json \
            | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); console.log(Object.values(d.result)[0].url)")
          echo "Preview URL: $DEPLOY_URL"
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STOCK_KIPREOS }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json
          PR_NUMBER: ${{ github.event.pull_request.number }}
