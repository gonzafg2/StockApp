name: Deploy to Firebase Hosting on PR
on:
  pull_request:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number for channel ID'
        required: true
        default: '8'
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/krypton
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Deploy Firebase Preview Channel
        run: |
          echo "=== Firebase CLI test ==="
          ./node_modules/.bin/firebase --version 2>&1 || echo "firebase --version failed with $?"
          echo "=== Writing SA credentials ==="
          echo "$FIREBASE_SA" > /tmp/firebase-sa.json
          wc -c /tmp/firebase-sa.json
          echo "=== Firebase projects list (auth test) ==="
          ./node_modules/.bin/firebase projects:list --debug 2>&1 | head -20 || echo "projects:list exit: $?"
          echo "=== Deploying ==="
          CHANNEL_ID="pr-${PR_NUMBER}"
          set +e
          node --trace-warnings \
            ./node_modules/firebase-tools/lib/bin/firebase.js hosting:channel:deploy "$CHANNEL_ID" \
            --expires 7d --project stock-kipreos --debug > /tmp/deploy-out.txt 2>&1
          DEPLOY_RC=$?
          echo "=== Deploy output (exit $DEPLOY_RC) ==="
          cat /tmp/deploy-out.txt
          echo "=== End deploy output ==="
          set -e
          [ $DEPLOY_RC -eq 0 ]
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STOCK_KIPREOS }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
